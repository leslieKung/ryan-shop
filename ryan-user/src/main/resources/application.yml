server:
  port: 9001

spring:
  application:
    name: ryan-user

  # database
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/ryan_user?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC
    username: root
    password: 123456

  # redis 配置
  redis:
    client-type: jedis
    host: 127.0.0.1
    # 添加用户名配置（Redis 6.0+）
    username: default
    password: 123456
    port: 6379
    timeout: 3000
    jedis:
      pool:
        # 连接池最大连接数（使用负值表示没有限制）
        max-active: 100
        # 连接池中的最大空闲连接
        max-idle: 100
        # 连接池中的最小空闲连接
        min-idle: 100
        # 连接池最大阻塞等待时间（使用负值表示没有限制）
        max-wait: 60000

  #邮箱服务配置
  mail:
    host: smtp.qq.com #发送邮件服务器
    username: 752244016@qq.com #发送邮件的邮箱地址
    password: alhkktmpixnabeff #客户端授权码，不是邮箱密码，QQ 邮箱的是自己设置的
    from: 752244016@qq.com # 发送邮件的地址，和上面username一致
    properties.mail.smtp.starttls.enable: true
    properties.mail.smtp.starttls.required: true
    properties.mail.smtp.ssl.enable: true
    default-encoding: utf-8


# mybatis-plus print log
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl




logging:
  level:
    root: INFO
